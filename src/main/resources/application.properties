# ============================================================
# APPLICATION NAME
# ============================================================
# This gives your application a name (shown in logs at startup)
spring.application.name=Movie Collection Manager


# ============================================================
# DATABASE CONNECTION SETTINGS
# ============================================================

# The JDBC URL tells Java WHERE your MySQL database is:
#   - jdbc:mysql://  → We're using MySQL
#   - localhost:3306  → MySQL is running on your computer, on port 3306 (default MySQL port)
#   - /movie_db       → The name of the database we'll create in MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/movie_db

# Your MySQL username (default is "root" when you install MySQL)
spring.datasource.username=root

# Your MySQL password (replace "root" with YOUR actual MySQL password)
spring.datasource.password=root

# The JDBC driver class that Java uses to communicate with MySQL
# This comes from the mysql-connector-j dependency we added in pom.xml
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
# JPA / HIBERNATE SETTINGS
# ============================================================

# Hibernate is the ORM (Object-Relational Mapping) tool that JPA uses.
# It translates your Java objects into database tables.

# "update" means:
#   - If the table doesn't exist → CREATE it automatically
#   - If you add a new field to your Entity → ALTER the table to add the column
#   - It will NEVER delete your existing data
# Other options: "create" (drops & recreates every time), "none" (do nothing)
spring.jpa.hibernate.ddl-auto=update

# This shows the actual SQL queries that Hibernate generates in your console.
# Super helpful for learning! You can see exactly what SQL is being run.
spring.jpa.show-sql=true

# Makes the SQL output nicely formatted (easy to read) instead of one long line
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate we're using MySQL 8 so it generates MySQL-compatible SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

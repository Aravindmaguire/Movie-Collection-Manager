# ============================================================
# APPLICATION NAME
# ============================================================
# This gives your application a name (shown in logs at startup)
spring.application.name=Movie Collection Manager


# ============================================================
# DATABASE CONNECTION SETTINGS
# ============================================================

# The JDBC URL tells Java WHERE your MySQL database is:
#   - jdbc:mysql://  → We're using MySQL
#   - localhost:3306  → MySQL is running on your computer, on port 3306 (default MySQL port)
#   - /movie_db       → The name of the database we'll create in MySQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver


# ============================================================
# JPA / HIBERNATE SETTINGS
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
